<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoConnect Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <div class="register-card">

            <h2 class="text-center mb-4">Create Account</h2>

         <form id="registerForm">

    <!-- Name -->
    <div class="mb-3">
        <label class="form-label">
            Full Name <span class="text-danger">*</span>
        </label>

        <input type="text"
               class="form-control"
               id="name"
               placeholder="Enter your full name">

        <div class="invalid-feedback">
            Name should contain only letters.
        </div>
    </div>

    <!-- Mobile -->
    <div class="mb-3">
        <label class="form-label">
            Mobile Number <span class="text-danger">*</span>
        </label>

        <input type="text"
               class="form-control"
               id="mobile"
               placeholder="Enter 10-digit mobile number">

        <div class="invalid-feedback">
            Enter a valid 10-digit mobile number.
        </div>
    </div>

    <!-- DOB -->
    <div class="mb-3">
        <label class="form-label">
            Date of Birth <span class="text-danger">*</span>
        </label>

        <input type="date"
               class="form-control"
               id="dob">

        <div class="invalid-feedback">
            Date of Birth is required.
        </div>
    </div>

    <!-- Email -->
    <div class="mb-3">
        <label class="form-label">
            Email Address <span class="text-danger">*</span>
        </label>

        <input type="email"
               class="form-control"
               id="email"
               placeholder="example@gmail.com">

        <div class="invalid-feedback">
            Enter a valid email address.
        </div>
    </div>

    <!-- Password -->
    <div class="mb-3">
        <label class="form-label">
            Password <span class="text-danger">*</span>
        </label>

        <div class="input-group">

            <input type="password"
                   class="form-control"
                   id="password"
                   placeholder="Enter Password">

            <span class="input-group-text" id="togglePassword">
                <i class="bi bi-eye-fill" id="eyeIcon"></i>
            </span>

        </div>

        <div class="invalid-feedback">
            Password must contain at least 8 characters, one uppercase letter, one lowercase letter, one number, and one special character.
        </div>

    </div>

    <!-- Confirm Password -->
    <div class="mb-4">

        <label class="form-label">
            Confirm Password <span class="text-danger">*</span>
        </label>

        <div class="input-group">

            <input type="password"
                   class="form-control"
                   id="confirmPassword"
                   placeholder="Re-enter your password">

            <span class="input-group-text" id="toggleConfirmPassword">
                <i class="bi bi-eye-fill" id="confirmEyeIcon"></i>
            </span>

        </div>

        <small id="matchMessage"></small>

    </div>


                <button class="btn register-btn w-100">
                    Register
                </button>

            </form>

        </div>

    </div>

    <!-- Success Toast -->
    <div class="toast-container position-fixed top-0 end-0 p-3">

        <div id="successToast" class="toast text-bg-success border-0">

            <div class="d-flex">

                <div class="toast-body">
                    <i class="bi bi-check-circle-fill"></i>
                    Registration Successful!
                </div>

                <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
