<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoConnect Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="payment-card">

        <h2 class="text-center mb-4">
            <i class="bi bi-credit-card-fill"></i>
            Payment Details
        </h2>

        <!-- Booking Summary -->
        <div class="summary-box mb-4">

            <h5>Booking Summary</h5>

            <p><strong>Customer:</strong> Sudeep</p>
            <p><strong>Vehicle:</strong> BMW S1000RR</p>
            <p><strong>Rental Amount:</strong> ₹5,000</p>
            <p><strong>Security Deposit:</strong> ₹2,000</p>

            <hr>

            <h4>Total Amount : ₹7,000</h4>

        </div>

        <!-- Payment Method -->
        <label class="form-label">
            Select Payment Method <span class="text-danger">*</span>
        </label>

        <select class="form-select mb-4" id="paymentMethod">

            <option value="">Choose Payment Method</option>

            <option>UPI</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
            <option>Net Banking</option>
            <option>Cash on Pickup</option>

        </select>

        <button class="btn pay-btn w-100" id="payBtn">
            Pay Now
        </button>

    </div>

</div>

<script src="payment.js"></script>

</body>
</html>
