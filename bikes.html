<!DOCTYPE html>
<html>
<head>
    <title>Bikes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

   <section class="bikes-header">
    <div>
        <h1>Our Bikes</h1>
        <p>Explore our premium collection of bikes</p>
    </div>
</section>

<!-- Vehicle Card 1 -->
 <section class="vehicle-section">
    <div class="container">
        <div class="row g-4">
                <div class="col-lg-4 col-md-6 vehicle-item type-bike">
                    <div class="vehicle-card card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="position-relative">
                            <img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?auto=format&fit=crop&w=600&q=80" class="card-img-top object-fit-cover" alt="Bike" style="height: 220px;">
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title fw-bold mb-0">Street Cruiser 500</h5>
                                <span class="h5 fw-bold text-primary-theme mb-0">₹1,500<span class="fs-14 text-muted fw-normal">/day</span></span>
                            </div>
                            <p class="text-muted fs-14 mb-3">Motorbike</p>
                            <ul class="list-inline vehicle-specs mb-4 pb-3 border-bottom">
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-user me-1"></i> 2 Seats</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gear me-1"></i> Manual</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gas-pump me-1"></i> Petrol</li>
                            </ul>
                            <button class="btn btn-outline-primary-theme w-100 rounded-pill fw-semibold">Rent Now</button>
                        </div>
                    </div>
                </div>


<!-- Vehicle Card 2-->
 
<div class="col-lg-4 col-md-6 vehicle-item type-bike">
                    <div class="vehicle-card card border-0 shadow-sm rounded-4 h-100 overflow-hidden">

                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title fw-bold mb-0">Adventure Trail 900</h5>
                                <span class="h5 fw-bold text-primary-theme mb-0">₹1,800<span class="fs-14 text-muted fw-normal">/day</span></span>
                            </div>
                            <p class="text-muted fs-14 mb-3">Motorbike</p>
                            <ul class="list-inline vehicle-specs mb-4 pb-3 border-bottom">
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-user me-1"></i> 1 Seat</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gear me-1"></i> Manual</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gas-pump me-1"></i> Petrol</li>
                            </ul>
                            <button class="btn btn-outline-primary-theme w-100 rounded-pill fw-semibold">Rent Now</button>
                        </div>
                    </div>
                </div>
<!-- Vehicle Card 3 -->
 <div class="col-lg-4 col-md-6 vehicle-item type-bike">
                    <div class="vehicle-card card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="position-relative">
                            <img src="https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?auto=format&fit=crop&w=600&q=80" class="card-img-top object-fit-cover" alt="Bike" style="height: 220px;">
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">

                            </div>
                            <p class="text-muted fs-14 mb-3">Motorbike</p>

                                <li class="list-inline-item text-muted"><i class="fa-solid fa-user me-1"></i> 2 Seats</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gear me-1"></i> Manual</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gas-pump me-1"></i> Petrol</li>
                            </ul>
                            <button class="btn btn-outline-primary-theme w-100 rounded-pill fw-semibold">Rent Now</button>
                        </div>
                    </div>
                </div>
<!-- Vehicle Card -->
        </div>
    </div>
</section>
<div class="text-center py-5">
    <a href="index.html" class="btn btn-primary-theme rounded-pill px-4">
