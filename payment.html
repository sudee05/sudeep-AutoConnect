<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | AutoConnect</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>
<body>

<section class="booking-header text-center text-white">
    <div>
        <h1>Payment</h1>
        <p>Complete your booking payment</p>
    </div>
</section>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow border-0 rounded-4">

<div class="card-body p-4">

<h3 class="text-primary-theme mb-4">
Booking Summary
</h3>

<div class="d-flex justify-content-between mb-3">
    <span>Vehicle</span>
    <span id="vehicleName"></span>
</div>

<div class="d-flex justify-content-between mb-3">
    <span>Price / Day</span>
    <span>₹<span id="pricePerDay"></span></span>
</div>

<div class="d-flex justify-content-between mb-3">
    <span>Rental Days</span>
    <span id="days"></span>
</div>

<div class="d-flex justify-content-between mb-3">
    <span>Tax (5%)</span>
    <span>₹<span id="tax"></span></span>
</div>

<hr>

<div class="d-flex justify-content-between">
    <h4>Total Amount</h4>
    <h3 class="text-primary-theme">
        ₹<span id="totalAmount"></span>
    </h3>
</div>

<button id="payBtn"
class="btn btn-primary-theme w-100 rounded-pill mt-4">
<i class="fa-solid fa-credit-card"></i>
 Pay Now
</button>

</div>

</div>

</div>

</div>

</div>

<script>

document.getElementById("payBtn").onclick = function(){

var options = {

    "key": "rzp_test_xxxxxxxxxx",

    "amount": 840000,

    "currency": "INR",

    "name": "AutoConnect",

    "description": "Vehicle Booking",

    "handler": function(response){

        alert(
            "Payment Successful!\n\nPayment ID:\n"
            + response.razorpay_payment_id
        );

    },

    "theme": {
        "color": "#a24486"
    }

};

var rzp = new Razorpay(options);

rzp.open();

}


document.getElementById("vehicleName").textContent =
localStorage.getItem("vehicle");

document.getElementById("pricePerDay").textContent =
localStorage.getItem("price");

document.getElementById("days").textContent =
localStorage.getItem("days");

document.getElementById("tax").textContent =
localStorage.getItem("tax");

document.getElementById("totalAmount").textContent =
localStorage.getItem("total");

</script>
</body>
</html>
