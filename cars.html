<!DOCTYPE html>
<html>
<head>
    <title>Cars</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>



<section class="cars-header">
    <div>
        <h1>Our Cars</h1>
        <p>Choose from our premium collection of cars</p>
    </div>
</section>

<section class="vehicle-section">
    <div class="container">

        <div class="row g-4">

            <!-- Car 1 -->
         <div class="col-lg-4 col-md-6 vehicle-item type-car">
                    <div class="vehicle-card card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="position-relative">
                            <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=600&q=80" class="card-img-top object-fit-cover" alt="Car" style="height: 220px;">
                            <span class="badge bg-primary-theme position-absolute top-0 end-0 m-3 px-3 py-2 rounded-pill">Featured</span>
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title fw-bold mb-0">Sports Coupe V8</h5>
                                <span class="h5 fw-bold text-primary-theme mb-0">₹8,000<span class="fs-14 text-muted fw-normal">/day</span></span>
                            </div>
                            <p class="text-muted fs-14 mb-3">Luxury Car</p>
                            <ul class="list-inline vehicle-specs mb-4 pb-3 border-bottom">
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-user me-1"></i> 2 Seats</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gear me-1"></i> Auto</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gas-pump me-1"></i> Petrol</li>
                            </ul>
                            <button class="btn btn-outline-primary-theme w-100 rounded-pill fw-semibold">Rent Now</button>
                        </div>
                    </div>
                </div>

            <!-- Car 2 -->
            
                <div class="col-lg-4 col-md-6 vehicle-item type-car">
                    <div class="vehicle-card card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="position-relative">
                            <img src="https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&w=600&q=80" class="card-img-top object-fit-cover" alt="Car" style="height: 220px;">
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title fw-bold mb-0">Family SUV</h5>
                                <span class="h5 fw-bold text-primary-theme mb-0">₹2,500<span class="fs-14 text-muted fw-normal">/day</span></span>
                            </div>
                            <p class="text-muted fs-14 mb-3">SUV</p>
                            <ul class="list-inline vehicle-specs mb-4 pb-3 border-bottom">
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-user me-1"></i> 5 Seats</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gear me-1"></i> Auto</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gas-pump me-1"></i> Diesel</li>
                            </ul>
                            <button class="btn btn-outline-primary-theme w-100 rounded-pill fw-semibold">Rent Now</button>
                        </div>
                    </div>
                </div>
            <!-- Car 3 -->
             <div class="col-lg-4 col-md-6 vehicle-item type-car">
                    <div class="vehicle-card card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="position-relative">
                            <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&w=600&q=80" class="card-img-top object-fit-cover" alt="Car" style="height: 220px;">
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title fw-bold mb-0">Electric Sedan</h5>
                                <span class="h5 fw-bold text-primary-theme mb-0">₹3,000<span class="fs-14 text-muted fw-normal">/day</span></span>
                            </div>
                            <p class="text-muted fs-14 mb-3">Eco Car</p>
                            <ul class="list-inline vehicle-specs mb-4 pb-3 border-bottom">
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-user me-1"></i> 5 Seats</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-gear me-1"></i> Auto</li>
                                <li class="list-inline-item text-muted"><i class="fa-solid fa-bolt me-1"></i> Electric</li>
                            </ul>
                            <button class="btn btn-outline-primary-theme w-100 rounded-pill fw-semibold">Rent Now</button>
                        </div>
                    </div>
                </div>
        

        </div>

    </div>
</section>

<div class="text-center mb-5">
    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left me-2"></i>
        Back Home
    </a>
</div>

</body>
</html>
